<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>rrcad preview</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #111827; overflow: hidden; }
    #status {
      position: fixed; top: 8px; left: 8px;
      color: #6b7280; font: 12px/1.5 monospace;
      pointer-events: none;
    }
    #logo {
      position: fixed; bottom: 16px; right: 16px;
      height: 36px; width: auto;
      opacity: 0.75;
      pointer-events: none;
    }
  </style>
  <script type="importmap">
  {
    "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/"
    }
  }
  </script>
</head>
<body>
<div id="status">rrcad preview — connecting…</div>
<img id="logo" src="/logo.png" alt="rrcad">
<script type="module">
import * as THREE from 'three';
import { GLTFLoader }      from 'three/addons/loaders/GLTFLoader.js';
import { OrbitControls }   from 'three/addons/controls/OrbitControls.js';
import { RoomEnvironment } from 'three/addons/environments/RoomEnvironment.js';

// ── Renderer ──────────────────────────────────────────────────────────────
const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setPixelRatio(devicePixelRatio);
renderer.setSize(innerWidth, innerHeight);
renderer.shadowMap.enabled  = true;
renderer.shadowMap.type     = THREE.PCFSoftShadowMap;  // softer shadow edges
renderer.outputColorSpace   = THREE.SRGBColorSpace;
renderer.toneMapping        = THREE.ACESFilmicToneMapping;  // natural highlight rolloff
renderer.toneMappingExposure = 1.0;
document.body.prepend(renderer.domElement);

// ── Scene ─────────────────────────────────────────────────────────────────
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x111827);

// PBR environment: baked room lighting used for ambient reflections on surfaces.
// This replaces the old coloured fill lights — gives materials a natural look
// without any artificial colour cast.
const pmrem = new THREE.PMREMGenerator(renderer);
scene.environment = pmrem.fromScene(new RoomEnvironment()).texture;
pmrem.dispose();

scene.add(new THREE.GridHelper(400, 40, 0x374151, 0x1f2937));
scene.add(new THREE.AxesHelper(30));

// HemisphereLight: cool sky above, warm ground below — the most natural-looking
// ambient source for indoor/studio scenes; replaces the old AmbientLight + blue fill.
const hemi = new THREE.HemisphereLight(0xddeeff, 0x221a0f, 0.6);
scene.add(hemi);

// Single key light: clean white, casts soft shadows.
const key = new THREE.DirectionalLight(0xffffff, 1.5);
key.position.set(3, 6, 4);
key.castShadow                   = true;
key.shadow.mapSize.width         = 2048;
key.shadow.mapSize.height        = 2048;
key.shadow.camera.near           = 0.5;
key.shadow.camera.far            = 1000;
key.shadow.bias                  = -0.0005;  // reduces shadow acne
scene.add(key);

// ── Camera ────────────────────────────────────────────────────────────────
const camera = new THREE.PerspectiveCamera(45, innerWidth / innerHeight, 0.01, 100000);
camera.position.set(80, 60, 120);

const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.08;

// ── GLTF loader ───────────────────────────────────────────────────────────
let currentModel = null;
const loader = new GLTFLoader();
const status  = document.getElementById('status');

function fitCamera(object) {
  const box    = new THREE.Box3().setFromObject(object);
  const center = box.getCenter(new THREE.Vector3());
  const size   = box.getSize(new THREE.Vector3());
  const maxDim = Math.max(size.x, size.y, size.z);
  if (maxDim === 0) return;

  const fov  = camera.fov * (Math.PI / 180);
  const dist = (maxDim / 2) / Math.tan(fov / 2) * 2.5;

  controls.target.copy(center);
  camera.position.copy(center).add(new THREE.Vector3(0.5, 0.4, 1.0).normalize().multiplyScalar(dist * 1.5));
  camera.near = dist / 1000;
  camera.far  = dist * 50;
  camera.updateProjectionMatrix();
  controls.update();
}

function loadModel() {
  status.textContent = 'rrcad preview — loading…';
  // Cache-bust so the browser always fetches the freshly written GLB.
  loader.load('/model.glb?' + Date.now(),
    gltf => {
      if (currentModel) scene.remove(currentModel);
      currentModel = gltf.scene;
      // OCCT exports in Z-up; glTF/Three.js is Y-up.
      // Rotate -90° around X to convert: OCCT(X,Y,Z) → Three.js(X,Z,-Y)
      currentModel.rotation.x = -Math.PI / 2;
      currentModel.traverse(node => {
        if (node.isMesh) {
          node.material.side = THREE.DoubleSide;
          node.castShadow    = true;
          node.receiveShadow = true;
        }
      });
      scene.add(currentModel);
      currentModel.updateMatrixWorld(true);
      fitCamera(currentModel);
      status.textContent = 'rrcad preview — live';
    },
    undefined,
    () => { status.textContent = 'rrcad preview — waiting for model…'; }
  );
}

loadModel();

// ── WebSocket live-reload ─────────────────────────────────────────────────
function connectWS() {
  const ws = new WebSocket('ws://' + location.host + '/ws');
  ws.onopen    = () => { status.textContent = 'rrcad preview — live'; };
  ws.onmessage = e  => { if (e.data === 'reload') loadModel(); };
  ws.onclose   = () => {
    status.textContent = 'rrcad preview — reconnecting…';
    setTimeout(connectWS, 1000);
  };
}
connectWS();

// ── Resize ────────────────────────────────────────────────────────────────
window.addEventListener('resize', () => {
  camera.aspect = innerWidth / innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
});

// ── Render loop ───────────────────────────────────────────────────────────
(function animate() {
  requestAnimationFrame(animate);
  controls.update();
  renderer.render(scene, camera);
})();
</script>
</body>
</html>
