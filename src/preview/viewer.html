<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>rrcad preview</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #0a0c10; overflow: hidden; }
    /* Cinematic vignette — darkens corners independently of the 3D scene. */
    #vignette {
      position: fixed; inset: 0;
      background: radial-gradient(ellipse at 50% 48%,
        transparent 50%, rgba(0,0,0,0.60) 100%);
      pointer-events: none;
    }
    #status {
      position: fixed; top: 8px; left: 8px;
      color: #4b5563; font: 12px/1.5 monospace;
      pointer-events: none;
    }
    #logo {
      position: fixed; bottom: 16px; right: 16px;
      height: 36px; width: auto;
      opacity: 0.55;
      pointer-events: none;
    }

    /* ── Hamburger menu ──────────────────────────────────────────────────── */
    #menu-btn {
      position: fixed; top: 8px; right: 8px;
      width: 30px; height: 30px;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.09);
      border-radius: 4px;
      cursor: pointer;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 4px;
      z-index: 20;
      transition: background 0.15s;
    }
    #menu-btn:hover { background: rgba(255,255,255,0.10); }
    #menu-btn span {
      display: block;
      width: 13px; height: 1.5px;
      background: #6b7280;
      border-radius: 1px;
      transition: background 0.15s;
    }
    #menu-btn:hover span,
    #menu-btn.open  span { background: #d1d5db; }

    #menu-panel {
      position: fixed; top: 44px; right: 8px;
      background: rgba(10,12,18,0.92);
      border: 1px solid rgba(255,255,255,0.09);
      border-radius: 6px;
      padding: 5px 0;
      min-width: 158px;
      font: 12px/1.5 monospace;
      color: #9ca3af;
      backdrop-filter: blur(10px);
      z-index: 20;
      display: none;
    }
    #menu-panel.open { display: block; }

    .menu-section + .menu-section {
      border-top: 1px solid rgba(255,255,255,0.06);
      margin-top: 3px;
      padding-top: 3px;
    }
    .menu-label {
      padding: 2px 11px 3px;
      font-size: 10px;
      color: #374151;
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }
    .menu-item {
      display: flex; align-items: center;
      padding: 4px 11px;
      cursor: pointer;
      gap: 8px;
      transition: color 0.1s;
    }
    .menu-item:hover  { color: #e5e7eb; }
    .menu-item.active { color: #f9fafb; }
    /* Radio dot */
    .menu-dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      border: 1.5px solid currentColor;
      flex-shrink: 0;
    }
    .menu-item.active .menu-dot { background: currentColor; }
    /* Checkbox */
    .menu-check {
      width: 9px; height: 9px;
      border: 1.5px solid currentColor;
      border-radius: 2px;
      flex-shrink: 0;
      position: relative;
    }
    .menu-item.active .menu-check::after {
      content: '';
      position: absolute; inset: 1.5px;
      background: currentColor;
      border-radius: 1px;
    }
    .menu-shortcut {
      margin-left: auto;
      color: #374151;
    }
    .menu-item:hover .menu-shortcut { color: #6b7280; }

    /* White scene overrides — keep UI readable on a bright background. */
    body.scene-white #status { color: #9ca3af; }
    body.scene-white #menu-btn {
      background: rgba(0,0,0,0.06);
      border-color: rgba(0,0,0,0.12);
    }
    body.scene-white #menu-btn span { background: #9ca3af; }
    body.scene-white #menu-btn:hover span,
    body.scene-white #menu-btn.open  span { background: #374151; }
  </style>
  <script type="importmap">
  {
    "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/"
    }
  }
  </script>
</head>
<body>
<div id="vignette"></div>
<div id="status">rrcad preview — connecting…</div>
<img id="logo" src="/logo.png" alt="rrcad">

<button id="menu-btn" aria-label="View menu">
  <span></span><span></span><span></span>
</button>
<div id="menu-panel">
  <div class="menu-section">
    <div class="menu-label">View</div>
    <div class="menu-item" id="mi-normal">
      <div class="menu-dot"></div>Normal<span class="menu-shortcut">F</span>
    </div>
    <div class="menu-item" id="mi-flatline">
      <div class="menu-dot"></div>Flat-line<span class="menu-shortcut">F</span>
    </div>
  </div>
  <div class="menu-section">
    <div class="menu-label">Scene</div>
    <div class="menu-item" id="mi-showroom">
      <div class="menu-dot"></div>Showroom
    </div>
    <div class="menu-item" id="mi-white">
      <div class="menu-dot"></div>White
    </div>
  </div>
  <div class="menu-section">
    <div class="menu-label">Show</div>
    <div class="menu-item" id="mi-axes">
      <div class="menu-check"></div>Axes<span class="menu-shortcut">A</span>
    </div>
  </div>
</div>
<script type="module">
import * as THREE from 'three';
import { GLTFLoader }      from 'three/addons/loaders/GLTFLoader.js';
import { OrbitControls }   from 'three/addons/controls/OrbitControls.js';
import { RoomEnvironment } from 'three/addons/environments/RoomEnvironment.js';

// ── Renderer ──────────────────────────────────────────────────────────────
const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
renderer.setSize(innerWidth, innerHeight);
renderer.shadowMap.enabled   = true;
renderer.shadowMap.type      = THREE.PCFSoftShadowMap;
renderer.outputColorSpace    = THREE.SRGBColorSpace;
renderer.toneMapping         = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.2;
document.body.prepend(renderer.domElement);

// ── Scene ─────────────────────────────────────────────────────────────────
const scene = new THREE.Scene();

// Gradient background: vertical sweep from deep near-black at the top down to
// a very faintly warm lift at the bottom — mimics the seamless paper sweep
// used in professional product photography studios.
// bgTex is declared at module scope so applySceneMode() can restore it.
const bgTex = (() => {
  const canvas = document.createElement('canvas');
  canvas.width = 2; canvas.height = 512;
  const ctx  = canvas.getContext('2d');
  const grad = ctx.createLinearGradient(0, 0, 0, 512);
  grad.addColorStop(0.0, '#090b0f');  // top    — deep cool shadow
  grad.addColorStop(0.5, '#10131a');  // middle — slight blue-grey
  grad.addColorStop(1.0, '#1c1f2a');  // bottom — very subtle warm lift
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, 2, 512);
  const tex = new THREE.CanvasTexture(canvas);
  tex.colorSpace = THREE.SRGBColorSpace;
  return tex;
})();
scene.background = bgTex;

// PBR ambient environment: IBL reflections on surfaces (quieter than default
// so the explicit studio lights dominate and give directional character).
const pmrem = new THREE.PMREMGenerator(renderer);
scene.environment          = pmrem.fromScene(new RoomEnvironment()).texture;
scene.environmentIntensity = 0.55;
pmrem.dispose();

// ── Studio floor ───────────────────────────────────────────────────────────
// Large circle acting as the studio floor / sweep.  Dark polished concrete:
// low roughness gives a faint mirror-like reflection of the model, exactly
// like the lacquered table surface used in high-end product shoots.
const floor = new THREE.Mesh(
  new THREE.CircleGeometry(2000, 64),
  new THREE.MeshStandardMaterial({
    color:     0x10121a,
    roughness: 0.30,
    metalness: 0.10,
  })
);
floor.rotation.x  = -Math.PI / 2;
floor.receiveShadow = true;
scene.add(floor);

// ── Lights ────────────────────────────────────────────────────────────────

// Hemisphere: soft sky / ground ambient bounce — keeps the dark side of the
// model from going pure black, just like a reflective studio environment.
const hemi = new THREE.HemisphereLight(0xc8d8ff, 0x221a10, 0.55);
scene.add(hemi);

// Key (main softbox): large virtual light from upper-left-front.
// Casts soft shadows onto the studio floor.
const key = new THREE.DirectionalLight(0xfff8f2, 2.4);
key.position.set(2, 9, 5);
key.castShadow               = true;
key.shadow.mapSize.setScalar(2048);
key.shadow.camera.near       = 0.5;
key.shadow.camera.far        = 2000;
key.shadow.bias              = -0.0005;
scene.add(key);

// Fill: cool blue-white from lower-right — lifts the shadow side without
// washing out the key-to-fill contrast.
const fill = new THREE.DirectionalLight(0xa8c4ff, 0.55);
fill.position.set(-5, 1, -2);
scene.add(fill);

// Rim (separation light): warm backlight from behind-top, creates a bright
// outline halo that separates the model from the dark background — the
// "hair light" of product photography.
const rim = new THREE.DirectionalLight(0xffe8c0, 1.2);
rim.position.set(-1, 7, -9);
scene.add(rim);

// Ground bounce: very faint warm fill from below, simulating light reflected
// back up off the studio floor onto the underside of the model.
const bounce = new THREE.DirectionalLight(0xff8844, 0.12);
bounce.position.set(0, -4, 3);
scene.add(bounce);

// ── Camera ────────────────────────────────────────────────────────────────
// 40° FOV gives a slightly telephoto look — less perspective distortion than
// the default 45°, which is characteristic of product photography lenses.
const camera = new THREE.PerspectiveCamera(40, innerWidth / innerHeight, 0.01, 100000);
camera.position.set(80, 60, 120);

const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping  = true;
controls.dampingFactor  = 0.07;
// Clamp vertical orbit so the user cannot go below the studio floor.
controls.maxPolarAngle  = Math.PI * 0.48;

// ── Helpers ───────────────────────────────────────────────────────────────
// A subtle axes helper (press 'A' to toggle) — hidden by default in studio mode.
const axes = new THREE.AxesHelper(30);
axes.visible = false;
scene.add(axes);

// View mode — persists across model reloads.
// 'normal' | 'flatline'
let viewMode = 'normal';

// ABS plastic material — defined here so applyViewMode can restore it.
const plastic = new THREE.MeshPhysicalMaterial({
  color:              0x2b2d30,  // dark charcoal
  roughness:          0.42,      // smooth but not mirror-like
  metalness:          0.00,      // pure plastic
  clearcoat:          0.50,      // thin glossy coat (mould sheen)
  clearcoatRoughness: 0.20,
  reflectivity:       0.35,
  side:               THREE.DoubleSide,
});

// Flat-shaded material used in flat-line mode — white, no PBR gloss.
const flatMaterial = new THREE.MeshLambertMaterial({
  color:       0xffffff,
  flatShading: true,
  side:        THREE.DoubleSide,
});

// Apply (or clear) edge-line helpers attached to each mesh as children.
function setEdgeLines(model, enabled) {
  if (!model) return;
  model.traverse(node => {
    if (!node.isMesh) return;
    if (enabled) {
      // Only add once — guard against double application.
      if (node.getObjectByName('__edgeLines')) return;
      // 15° crease angle: shows sharp CAD edges, omits micro-facet triangulation noise.
      const geo   = new THREE.EdgesGeometry(node.geometry, 15);
      const lines = new THREE.LineSegments(geo,
        new THREE.LineBasicMaterial({ color: 0x555555 }));
      lines.name = '__edgeLines';
      node.add(lines);
    } else {
      const lines = node.getObjectByName('__edgeLines');
      if (lines) node.remove(lines);
    }
  });
}

function applyViewMode(model) {
  if (!model) return;
  const fl = (viewMode === 'flatline');
  model.traverse(node => {
    if (!node.isMesh) return;
    node.material = fl ? flatMaterial : plastic;
  });
  setEdgeLines(model, fl);
}

function statusText() {
  return viewMode === 'flatline' ? 'rrcad preview — flat-line'
                                 : 'rrcad preview — live';
}

// ── Scene mode ────────────────────────────────────────────────────────────
// 'showroom' — dark studio  |  'white' — pure white inspection scene
let sceneMode = 'showroom';
const vignette = document.getElementById('vignette');

function applySceneMode() {
  if (sceneMode === 'white') {
    scene.background       = new THREE.Color(0xffffff);
    scene.environmentIntensity = 0.25;
    floor.material.color.set(0xffffff);
    floor.material.roughness = 0.90;
    floor.material.metalness = 0.00;
    // Neutral bright lighting: flat hemisphere + soft overhead key only.
    hemi.color.set(0xffffff); hemi.groundColor.set(0xffffff); hemi.intensity = 2.0;
    key.color.set(0xffffff);  key.intensity  = 1.0;
    fill.intensity   = 0.6;
    rim.intensity    = 0.0;
    bounce.intensity = 0.0;
    vignette.style.display = 'none';
    document.body.classList.add('scene-white');
  } else {
    scene.background       = bgTex;
    scene.environmentIntensity = 0.55;
    floor.material.color.set(0x10121a);
    floor.material.roughness = 0.30;
    floor.material.metalness = 0.10;
    // Restore original showroom lights.
    hemi.color.set(0xc8d8ff); hemi.groundColor.set(0x221a10); hemi.intensity = 0.55;
    key.color.set(0xfff8f2);  key.intensity  = 2.4;
    fill.intensity   = 0.55;
    rim.intensity    = 1.2;
    bounce.intensity = 0.12;
    vignette.style.display = '';
    document.body.classList.remove('scene-white');
  }
  floor.material.needsUpdate = true;
}

// ── Menu ─────────────────────────────────────────────────────────────────
const menuBtn   = document.getElementById('menu-btn');
const menuPanel = document.getElementById('menu-panel');

function syncMenu() {
  document.getElementById('mi-normal')  .classList.toggle('active', viewMode === 'normal');
  document.getElementById('mi-flatline').classList.toggle('active', viewMode === 'flatline');
  document.getElementById('mi-showroom').classList.toggle('active', sceneMode === 'showroom');
  document.getElementById('mi-white')   .classList.toggle('active', sceneMode === 'white');
  document.getElementById('mi-axes')    .classList.toggle('active', axes.visible);
}

menuBtn.addEventListener('click', e => {
  e.stopPropagation();
  const open = menuPanel.classList.toggle('open');
  menuBtn.classList.toggle('open', open);
  if (open) syncMenu();
});

// Close when clicking outside the panel.
document.addEventListener('click', () => {
  menuPanel.classList.remove('open');
  menuBtn.classList.remove('open');
});
menuPanel.addEventListener('click', e => e.stopPropagation());

document.getElementById('mi-normal').addEventListener('click', () => {
  viewMode = 'normal';
  applyViewMode(currentModel);
  status.textContent = statusText();
  syncMenu();
});
document.getElementById('mi-flatline').addEventListener('click', () => {
  viewMode = 'flatline';
  applyViewMode(currentModel);
  status.textContent = statusText();
  syncMenu();
});
document.getElementById('mi-showroom').addEventListener('click', () => {
  sceneMode = 'showroom';
  applySceneMode();
  syncMenu();
});
document.getElementById('mi-white').addEventListener('click', () => {
  sceneMode = 'white';
  applySceneMode();
  syncMenu();
});
document.getElementById('mi-axes').addEventListener('click', () => {
  axes.visible = !axes.visible;
  syncMenu();
});

window.addEventListener('keydown', e => {
  if (e.key === 'a' || e.key === 'A') { axes.visible = !axes.visible; syncMenu(); }
  if (e.key === 'f' || e.key === 'F') {
    viewMode = (viewMode === 'flatline') ? 'normal' : 'flatline';
    applyViewMode(currentModel);
    status.textContent = statusText();
    syncMenu();
  }
});

// ── GLTF loader ───────────────────────────────────────────────────────────
let currentModel = null;
const loader = new GLTFLoader();
const status = document.getElementById('status');

// Resize the key-light's shadow camera to tightly wrap the loaded model
// so shadows are crisp rather than washed out by an over-large frustum.
function fitShadowCamera(box) {
  const size   = box.getSize(new THREE.Vector3());
  const center = box.getCenter(new THREE.Vector3());
  const r      = Math.max(size.x, size.y, size.z) * 1.6;
  const cam    = key.shadow.camera;
  cam.left   = center.x - r;
  cam.right  = center.x + r;
  cam.top    = center.y + r;
  cam.bottom = center.y - r;
  cam.updateProjectionMatrix();
}

function fitCamera(object) {
  const box    = new THREE.Box3().setFromObject(object);
  const center = box.getCenter(new THREE.Vector3());
  const size   = box.getSize(new THREE.Vector3());
  const maxDim = Math.max(size.x, size.y, size.z);
  if (maxDim === 0) return;

  fitShadowCamera(box);

  const fov  = camera.fov * (Math.PI / 180);
  // Fit the bounding sphere into the FOV, then add a small margin (1.15×)
  // so the model fills the frame closely without clipping.
  const dist = (maxDim / 2) / Math.tan(fov / 2) * 1.15;

  controls.target.copy(center);
  controls.minDistance = 0;
  controls.maxDistance = Infinity;
  camera.position.copy(center).add(
    new THREE.Vector3(0.5, 0.35, 1.0).normalize().multiplyScalar(dist)
  );
  camera.near = dist / 1000;
  camera.far  = dist * 50;
  camera.updateProjectionMatrix();
  controls.update();
}

function loadModel() {
  status.textContent = 'rrcad preview — loading…';
  // Cache-bust so the browser always fetches the freshly written GLB.
  loader.load('/model.glb?' + Date.now(),
    gltf => {
      if (currentModel) scene.remove(currentModel);
      currentModel = gltf.scene;

      // OCCT exports in Z-up; glTF/Three.js is Y-up.
      // Rotate -90° around X to convert: OCCT(X,Y,Z) → Three.js(X,Z,−Y).
      currentModel.rotation.x = -Math.PI / 2;
      currentModel.updateMatrixWorld(true);

      // Translate the model so its lowest point rests exactly on Y = 0
      // (the studio floor plane).  This makes the shadow land correctly.
      const box0 = new THREE.Box3().setFromObject(currentModel);
      currentModel.position.y -= box0.min.y;
      currentModel.updateMatrixWorld(true);

      // Apply the base plastic material and shadow settings to all meshes.
      // applyViewMode() will override material/edges to match the active view mode.
      currentModel.traverse(node => {
        if (node.isMesh) {
          node.material      = plastic;
          node.castShadow    = true;
          node.receiveShadow = true;
        }
      });

      scene.add(currentModel);
      currentModel.updateMatrixWorld(true);
      fitCamera(currentModel);
      applyViewMode(currentModel);
      status.textContent = statusText();
    },
    undefined,
    () => { status.textContent = 'rrcad preview — waiting for model…'; }
  );
}

loadModel();

// ── WebSocket live-reload ─────────────────────────────────────────────────
function connectWS() {
  const ws = new WebSocket('ws://' + location.host + '/ws');
  ws.onopen    = () => { status.textContent = statusText(); };
  ws.onmessage = e  => { if (e.data === 'reload') loadModel(); };
  ws.onclose   = () => {
    status.textContent = 'rrcad preview — reconnecting…';
    setTimeout(connectWS, 1000);
  };
}
connectWS();

// ── Resize ────────────────────────────────────────────────────────────────
window.addEventListener('resize', () => {
  camera.aspect = innerWidth / innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
});

// ── Render loop ───────────────────────────────────────────────────────────
(function animate() {
  requestAnimationFrame(animate);
  controls.update();
  renderer.render(scene, camera);
})();
</script>
</body>
</html>
